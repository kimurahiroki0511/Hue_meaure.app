<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>トマトHue記録</title>
<style>
  :root{
    --bg:#14110e; --panel:#1f1a15; --panel2:#271f18; --line:#3a322a;
    --text:#f3ede4; --muted:#a89d8d; --accent:#ff5a3c; --accent-dim:#c7402a;
    --ok:#7bbf6a; --blue:#5aa9ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;-webkit-text-size-adjust:100%;}
  header{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;
    justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;}
  header h1{font-size:16px;margin:0;font-weight:650;}
  header .date{font-size:13px;color:var(--muted);}
  .tabs{display:flex;border-bottom:1px solid var(--line);position:sticky;top:53px;background:var(--bg);z-index:9;}
  .tab{flex:1;border:none;background:transparent;color:var(--muted);font-size:15px;font-weight:650;
    padding:14px;border-bottom:2px solid transparent;}
  .tab.active{color:var(--text);border-bottom-color:var(--accent);}
  main{padding:16px;max-width:760px;margin:0 auto;padding-bottom:120px;}
  button{appearance:none;border:1px solid var(--line);border-radius:12px;background:var(--panel);
    color:var(--text);font-size:15px;font-weight:600;padding:14px;cursor:pointer;}
  button:active{background:var(--panel2);}
  button.primary{background:var(--accent);color:#1a0f0b;border-color:transparent;}
  button.primary:active{background:var(--accent-dim);}
  button.primary:disabled{background:#4a423a;color:var(--muted);}
  button.ghost{background:transparent;}
  .status{margin-top:12px;padding:10px 12px;border-radius:10px;background:var(--panel);
    border:1px solid var(--line);font-size:12.5px;line-height:1.6;color:var(--muted);
    white-space:pre-wrap;word-break:break-word;}
  .status .ok{color:var(--ok);} .status .err{color:var(--accent);}
  .canvas-wrap{margin-top:14px;border-radius:12px;overflow:hidden;border:1px solid var(--line);
    background:#000;display:none;position:relative;}
  canvas{width:100%;display:block;touch-action:none;}
  .hint{margin-top:10px;font-size:12.5px;color:var(--muted);line-height:1.6;}
  input[type=file]{display:none;}

  /* cluster selector */
  .cluster-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .cluster-chip{padding:10px 14px;border-radius:999px;border:1px solid var(--line);
    background:var(--panel);font-size:14px;font-weight:650;}
  .cluster-chip.sel{background:var(--accent);color:#1a0f0b;border-color:transparent;}
  .cluster-chip.add{color:var(--blue);}
  .field-label{font-size:12px;color:var(--muted);margin:0 0 6px;font-weight:600;}

  .det-list{margin-top:14px;display:none;}
  .det-list h3{font-size:13px;color:var(--muted);margin:0 0 8px;font-weight:600;}
  .det-item{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:8px;background:var(--panel);}
  .det-item.rejected{opacity:.4;}
  .det-swatch{width:34px;height:34px;border-radius:8px;flex:none;border:1px solid var(--line);}
  .det-info{flex:1;font-size:13px;line-height:1.45;} .det-info b{font-size:15px;}
  .det-num{width:54px;height:40px;flex:none;border-radius:8px;background:var(--panel2);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:700;}
  .det-num.unset{color:var(--muted);} .det-num.set{color:var(--accent);border-color:var(--accent);}

  .footer-bar{position:fixed;bottom:0;left:0;right:0;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,var(--bg) 22%);display:flex;gap:10px;max-width:760px;margin:0 auto;}
  .footer-bar button{flex:1;}
  .saved-count{font-size:12px;color:var(--muted);text-align:center;margin-top:6px;}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:50;}
  .modal{background:var(--panel);width:100%;border-radius:18px 18px 0 0;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom));border-top:1px solid var(--line);
    max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 4px;font-size:16px;} .modal p{margin:0 0 14px;font-size:12.5px;color:var(--muted);}
  .numgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;}
  .numgrid button{padding:14px 0;font-size:16px;} .numgrid button.prev{border-color:var(--accent);color:var(--accent);}
  .numgrid button.sel{background:var(--accent);color:#1a0f0b;border-color:transparent;}
  .new-num{display:flex;gap:8px;margin-bottom:12px;}
  .new-num input{flex:1;background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:12px;font-size:16px;}
  .label-row{display:flex;gap:6px;margin-bottom:10px;}
  .label-row button{flex:1;padding:12px 4px;font-size:13px;}
  .label-row button.sel{background:var(--accent);color:#1a0f0b;border-color:transparent;}
  .modal-actions{display:flex;gap:10px;}
  #modalReject.on{background:var(--accent);color:#1a0f0b;border-color:transparent;}

  /* records browser */
  .crumbs{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-bottom:14px;flex-wrap:wrap;}
  .crumbs a{color:var(--blue);text-decoration:none;}
  .grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .folder{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel);}
  .folder .thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#000;}
  .folder .thumb.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:30px;}
  .folder .fmeta{padding:10px 12px;}
  .folder .fmeta .t{font-size:15px;font-weight:700;}
  .folder .fmeta .s{font-size:11px;color:var(--muted);margin-top:2px;}
  .folder{position:relative;}
  .folder .fdel{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:9px;
    background:rgba(20,17,14,.72);border:1px solid var(--line);color:#fff;font-size:15px;
    display:flex;align-items:center;justify-content:center;z-index:2;}
  .folder .fdel:active{background:var(--accent);color:#14110e;border-color:transparent;}
  .rec-row{display:flex;align-items:center;gap:12px;padding:12px 10px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:8px;background:var(--panel);}
  .rec-row .rnum{width:48px;height:40px;flex:none;border-radius:8px;background:var(--accent);color:#14110e;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;}
  .rec-row .rhue{font-size:20px;font-weight:750;flex:1;}
  .rec-row .rlabel{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);flex:none;}
  .rec-row .rdel{width:32px;height:32px;flex:none;padding:0;border-radius:8px;background:transparent;
    border:1px solid var(--line);color:var(--muted);font-size:14px;}
  .rec-row .rdel:active{background:var(--accent);color:#14110e;border-color:transparent;}
  .rec-empty{color:var(--muted);font-size:14px;text-align:center;padding:40px 16px;line-height:1.7;}
  .trend{font-size:13px;color:var(--muted);margin:4px 0 14px;}
  .big-photo{width:100%;border-radius:12px;border:1px solid var(--line);margin-bottom:14px;display:block;}
  .addcluster{margin-top:8px;}
</style>
</head>
<body>
<header>
  <h1>トマトHue記録</h1>
  <span class="date" id="dateLabel"></span>
</header>
<nav class="tabs">
  <button class="tab active" id="tabCapture">撮影</button>
  <button class="tab" id="tabRecords">記録</button>
</nav>
<main>
 <section id="captureView">
  <p class="field-label">房を選択</p>
  <div class="cluster-bar" id="clusterBar"></div>

  <button class="primary" id="pickBtn" disabled>読み込み中…</button>
  <input type="file" id="file" accept="image/*" capture="environment">

  <div class="status" id="status">起動中…</div>

  <div class="canvas-wrap" id="cwrap"><canvas id="cv"></canvas></div>
  <div class="hint" id="hint" style="display:none">
    検出された各トマトをタップ → 個体番号と熟度を割り当て。誤検出はタップして「誤検出にする」を押してください。
    <div style="margin-top:10px">
      <label style="display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text)">
        <input type="checkbox" id="maskToggle" checked style="width:18px;height:18px">計測範囲(マスク)を表示
      </label>
    </div>
  </div>

  <div class="det-list" id="detList"><h3>検出されたトマト</h3><div id="detItems"></div></div>
 </section>

 <section id="recordsView" style="display:none">
  <div class="crumbs" id="crumbs"></div>
  <div id="recordsBody"></div>
 </section>
</main>

<div class="footer-bar" id="footerBar" style="display:none">
  <button class="ghost" id="exportBtn">CSV書出</button>
  <button class="primary" id="saveBtn" disabled>記録</button>
</div>
<div class="saved-count" id="savedCount" style="display:none"></div>

<!-- assignment modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>個体番号と熟度</h3>
    <p id="modalSub">このトマトに番号を割り当てます。</p>
    <div id="prevNums"></div>
    <div class="new-num">
      <input type="text" id="newNumInput" placeholder="個体番号（例: 1, 2, 3）" inputmode="numeric" autocapitalize="off" autocomplete="off">
      <button id="newNumBtn" style="flex:none;padding:12px 16px">追加</button>
    </div>
    <div class="label-row" id="labelRow"></div>
    <p id="curAssign" style="margin:0 0 12px;font-size:13px;color:var(--ok);font-weight:600">番号未設定</p>
    <div class="modal-actions">
      <button class="ghost" id="modalReject" style="flex:1">誤検出にする</button>
      <button class="ghost" id="modalClear" style="flex:none;padding:12px 16px">解除</button>
      <button class="primary" id="modalDone" style="flex:none;padding:12px 20px">完了</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
<script>
const MODEL_URL='best_q.onnx';
const IMG=640, CONF=0.35, MASK_THR=0.5, IOU_DEDUP=0.7;
const LABELS=['Green','Yellow','Orange','Red'];
const LABEL_RANGES={'Green':'60–160','Yellow':'40–60','Orange':'16–40','Red':'0–16 / 340–360'};
function hueToLabel(h){
  if(h<0) return '';
  if((h>=0&&h<16)||(h>=340&&h<=360)) return 'Red';
  if(h>=16&&h<40) return 'Orange';
  if(h>=40&&h<60) return 'Yellow';
  if(h>=60&&h<160) return 'Green';
  return '';
}
function colorForHue(h){
  if(h<0) return 'var(--muted)';
  const l=hueToLabel(h);
  return l==='Red'?'#ff5a3c':l==='Orange'?'#ff9a3c':l==='Yellow'?'#e8c84a':l==='Green'?'#7bbf6a':'var(--muted)';
}

// ---------- state ----------
let session=null;
let detections=[];
let activeIdx=-1;
let showMask=true;
let curImg=null;
let clusters=[];          // ['房1','房2',...]
let selectedCluster=null;
let records=[];           // {cluster,date,num,hue,label,conf,maskpx,photoId}
let curPhotoBlobUrl=null; // object URL for current capture (for saving)
let curPhotoDataUrl=null; // data URL to persist in IndexedDB

const $=id=>document.getElementById(id);
const statusEl=$('status'),pickBtn=$('pickBtn'),fileEl=$('file');
const cv=$('cv'),cwrap=$('cwrap'),ctx=cv.getContext('2d',{willReadFrequently:true});
const detList=$('detList'),detItems=$('detItems'),hint=$('hint');
const footerBar=$('footerBar'),saveBtn=$('saveBtn'),savedCount=$('savedCount');

function todayStr(){const d=new Date();const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
$('dateLabel').textContent=todayStr();
function log(m,c){statusEl.innerHTML=c?`<span class="${c}">${m}</span>`:m;}
function append(m,c){statusEl.innerHTML+='\n'+(c?`<span class="${c}">${m}</span>`:m);}

// ---------- IndexedDB for photos ----------
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('tomatoHueDB',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('photos')) d.createObjectStore('photos');
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=e=>rej(e.target.error);
  });
}
function putPhoto(id,dataUrl){
  return new Promise((res,rej)=>{
    const tx=db.transaction('photos','readwrite');
    tx.objectStore('photos').put(dataUrl,id);
    tx.oncomplete=()=>res(); tx.onerror=e=>rej(e.target.error);
  });
}
function getPhoto(id){
  return new Promise((res,rej)=>{
    const tx=db.transaction('photos','readonly');
    const rq=tx.objectStore('photos').get(id);
    rq.onsuccess=()=>res(rq.result||null); rq.onerror=e=>rej(e.target.error);
  });
}
function delPhoto(id){
  return new Promise(res=>{
    try{const tx=db.transaction('photos','readwrite');const s=tx.objectStore('photos');s.delete(id);s.delete('ov_'+id);tx.oncomplete=()=>res();}
    catch(e){res();}
  });
}
// overlay (boxes + mask grids + numbers) stored as JSON under key ov_<photoId>
function putOverlay(id,obj){
  return new Promise((res,rej)=>{
    const tx=db.transaction('photos','readwrite');
    tx.objectStore('photos').put(JSON.stringify(obj),'ov_'+id);
    tx.oncomplete=()=>res(); tx.onerror=e=>rej(e.target.error);
  });
}
function getOverlay(id){
  return new Promise(res=>{
    try{const tx=db.transaction('photos','readonly');const rq=tx.objectStore('photos').get('ov_'+id);
      rq.onsuccess=()=>{ try{res(rq.result?JSON.parse(rq.result):null);}catch(e){res(null);} };
      rq.onerror=()=>res(null);}
    catch(e){res(null);}
  });
}

// ---------- localStorage for metadata ----------
function saveMeta(){
  try{
    localStorage.setItem('th_records',JSON.stringify(records));
    localStorage.setItem('th_clusters',JSON.stringify(clusters));
  }catch(e){}
}
function loadMeta(){
  try{
    const r=localStorage.getItem('th_records'); if(r) records=JSON.parse(r);
    const c=localStorage.getItem('th_clusters'); if(c) clusters=JSON.parse(c);
  }catch(e){}
  if(!clusters.length) clusters=['房1','房2','房3'];
  selectedCluster=clusters[0];
}
function refreshSavedCount(){
  savedCount.style.display='block';
  savedCount.textContent=`保存済み ${records.length}件 ・ 房 ${clusters.length}個`;
}

// ---------- cluster selector ----------
function renderClusterBar(){
  const bar=$('clusterBar'); bar.innerHTML='';
  clusters.forEach(c=>{
    const b=document.createElement('button');
    b.className='cluster-chip'+(c===selectedCluster?' sel':'');
    b.textContent=c;
    b.onclick=()=>{ selectedCluster=c; renderClusterBar(); };
    bar.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='cluster-chip add'; add.textContent='＋ 房を追加';
  add.onclick=()=>{
    const name=prompt('追加する房の名前（例: 房4）');
    if(name && name.trim()){
      const nm=name.trim();
      if(!clusters.includes(nm)){ clusters.push(nm); selectedCluster=nm; saveMeta(); }
      renderClusterBar();
    }
  };
  bar.appendChild(add);
}

// ---------- model ----------
async function init(){
  loadMeta();
  renderClusterBar();
  refreshSavedCount();
  try{ await openDB(); }catch(e){ /* still works, just no photos */ }
  try{
    log('モデルを読み込んでいます…(初回は数十秒かかることがあります)');
    ort.env.wasm.numThreads=1; ort.env.wasm.simd=true;
    session=await ort.InferenceSession.create(MODEL_URL,{executionProviders:['wasm'],graphOptimizationLevel:'all'});
    log('準備完了。房を選んで撮影してください。','ok');
    pickBtn.textContent='房を撮影 / 写真を選ぶ'; pickBtn.disabled=false;
    footerBar.style.display='flex';
  }catch(e){ log('モデル読み込み失敗:\n'+e.message,'err'); }
}

pickBtn.addEventListener('click',()=>{
  if(!selectedCluster){ log('先に房を選んでください。','err'); return; }
  fileEl.click();
});
fileEl.addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const img=new Image();
  img.onload=()=>{ makePhotoDataUrl(img); runDetection(img); URL.revokeObjectURL(img.src); };
  img.onerror=()=>log('画像を開けませんでした。','err');
  img.src=URL.createObjectURL(f); fileEl.value='';
});

// downscale captured photo to keep storage light (max 1280px long edge, jpeg)
function makePhotoDataUrl(img){
  const maxEdge=1280;
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const sc=Math.min(1,maxEdge/Math.max(iw,ih));
  const w=Math.round(iw*sc), h=Math.round(ih*sc);
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  curPhotoDataUrl=c.toDataURL('image/jpeg',0.8);
}

function letterbox(img){
  const iw=img.naturalWidth,ih=img.naturalHeight;
  const r=Math.min(IMG/iw,IMG/ih),nw=Math.round(iw*r),nh=Math.round(ih*r);
  const dx=Math.floor((IMG-nw)/2),dy=Math.floor((IMG-nh)/2);
  const off=document.createElement('canvas');off.width=IMG;off.height=IMG;
  const octx=off.getContext('2d',{willReadFrequently:true});
  octx.fillStyle='#727272';octx.fillRect(0,0,IMG,IMG);
  octx.drawImage(img,0,0,iw,ih,dx,dy,nw,nh);
  return {octx,r,dx,dy};
}
function toTensor(octx){
  const {data}=octx.getImageData(0,0,IMG,IMG);
  const arr=new Float32Array(3*IMG*IMG),plane=IMG*IMG;
  for(let i=0;i<plane;i++){arr[i]=data[i*4]/255;arr[plane+i]=data[i*4+1]/255;arr[2*plane+i]=data[i*4+2]/255;}
  return new ort.Tensor('float32',arr,[1,3,IMG,IMG]);
}
const sigmoid=x=>1/(1+Math.exp(-x));
function iou(a,b){
  const x1=Math.max(a[0],b[0]),y1=Math.max(a[1],b[1]);
  const x2=Math.min(a[2],b[2]),y2=Math.min(a[3],b[3]);
  const w=Math.max(0,x2-x1),h=Math.max(0,y2-y1),inter=w*h;
  const ua=(a[2]-a[0])*(a[3]-a[1])+(b[2]-b[0])*(b[3]-b[1])-inter;
  return ua>0?inter/ua:0;
}
function rgb2hue(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  if(d===0) return -1;
  let h; if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4;
  h*=60; if(h<0)h+=360; return h;
}

async function runDetection(img){
  try{
    curImg=img;
    detList.style.display='none'; detItems.innerHTML=''; detections=[]; saveBtn.disabled=true;
    log('前処理中…');
    const lb=letterbox(img); const tensor=toTensor(lb.octx);
    log('YOLO推論中…');
    const t0=performance.now();
    const out=await session.run({images:tensor});
    const ms=Math.round(performance.now()-t0);
    const o0=out['output0'],o1=out['output1'];
    const det=o0.data,proto=o1.data;
    const NROW=o0.dims[1],NCOL=o0.dims[2];
    const PC=o1.dims[1],PH=o1.dims[2],PW=o1.dims[3];
    let dets=[];
    for(let i=0;i<NROW;i++){
      const base=i*NCOL,conf=det[base+4]; if(conf<CONF) continue;
      const box=[det[base],det[base+1],det[base+2],det[base+3]];
      const coef=new Float32Array(32); for(let k=0;k<32;k++) coef[k]=det[base+6+k];
      dets.push({box,conf,coef});
    }
    dets.sort((a,b)=>b.conf-a.conf);
    const keep=[]; for(const d of dets){ if(keep.some(k=>iou(k.box,d.box)>IOU_DEDUP)) continue; keep.push(d); }
    const iw=img.naturalWidth,ih=img.naturalHeight;
    cv.width=iw; cv.height=ih; ctx.drawImage(img,0,0);
    cwrap.style.display='block'; hint.style.display='block';
    const inv=(x,y)=>[(x-lb.dx)/lb.r,(y-lb.dy)/lb.r];
    const src=ctx.getImageData(0,0,iw,ih).data;
    const protoPlane=PH*PW;
    keep.forEach(d=>{
      const [bx1,by1]=inv(d.box[0],d.box[1]);
      const [bx2,by2]=inv(d.box[2],d.box[3]);
      const ox1=Math.max(0,Math.floor(bx1)),oy1=Math.max(0,Math.floor(by1));
      const ox2=Math.min(iw,Math.ceil(bx2)),oy2=Math.min(ih,Math.ceil(by2));
      let cntH=0,maskPx=0,sx=0,sy=0; const maskCoords=[];
      const maskAt=(gx,gy)=>{
        const x0=Math.floor(gx),y0=Math.floor(gy);
        const x1=Math.min(PW-1,x0+1),y1=Math.min(PH-1,y0+1);
        const fx=gx-x0,fy=gy-y0;
        const xa=Math.max(0,Math.min(PW-1,x0)),ya=Math.max(0,Math.min(PH-1,y0));
        let v00=0,v10=0,v01=0,v11=0;
        const p00=ya*PW+xa,p10=ya*PW+x1,p01=y1*PW+xa,p11=y1*PW+x1;
        for(let c=0;c<PC;c++){const cp=c*protoPlane;
          v00+=d.coef[c]*proto[cp+p00];v10+=d.coef[c]*proto[cp+p10];
          v01+=d.coef[c]*proto[cp+p01];v11+=d.coef[c]*proto[cp+p11];}
        const top=v00*(1-fx)+v10*fx,bot=v01*(1-fx)+v11*fx;
        return sigmoid(top*(1-fy)+bot*fy);
      };
      for(let oy=oy1;oy<oy2;oy++){for(let ox=ox1;ox<ox2;ox++){
        const lx=ox*lb.r+lb.dx,ly=oy*lb.r+lb.dy;
        const gx=lx/IMG*PW,gy=ly/IMG*PH;
        if(maskAt(gx,gy)>MASK_THR){
          maskPx++; const o=(oy*iw+ox)*4;
          const h=rgb2hue(src[o],src[o+1],src[o+2]);
          if(h>=0){const rad=h*Math.PI/180;sx+=Math.cos(rad);sy+=Math.sin(rad);cntH++;}
          maskCoords.push(o);
        }
      }}
      let hue=-1; if(cntH>0){let a=Math.atan2(sy/cntH,sx/cntH)*180/Math.PI;if(a<0)a+=360;hue=a;}
      let rr=0,gg=0,bb=0; maskCoords.forEach(o=>{rr+=src[o];gg+=src[o+1];bb+=src[o+2];});
      const n=maskCoords.length||1;
      const swatch=`rgb(${rr/n|0},${gg/n|0},${bb/n|0})`;
      // compact mask grid (GRID×GRID over the box) for redrawing later in records
      const GRID=28;
      let gridStr='';
      const bw=Math.max(1,bx2-bx1), bh=Math.max(1,by2-by1);
      for(let gj=0;gj<GRID;gj++){
        for(let gi=0;gi<GRID;gi++){
          const ox=bx1+(gi+0.5)/GRID*bw, oy=by1+(gj+0.5)/GRID*bh;
          const lx=ox*lb.r+lb.dx, ly=oy*lb.r+lb.dy;
          gridStr += (maskAt(lx/IMG*PW, ly/IMG*PH)>MASK_THR) ? '1':'0';
        }
      }
      detections.push({box:[bx1,by1,bx2,by2],conf:d.conf,maskPx,hue,swatch,num:null,label:null,maskCoords,rejected:false,
        grid:gridStr, gridN:GRID, imgW:iw, imgH:ih});
    });
    // order detections left→right (and top→bottom when horizontally close)
    // so the list matches reading order and you can number 1,2,3 from the left
    const avgW = detections.length ? detections.reduce((s,d)=>s+(d.box[2]-d.box[0]),0)/detections.length : 0;
    const tol = avgW*0.6; // tomatoes whose centers are within this x-distance count as same column
    detections.sort((a,b)=>{
      const ax=(a.box[0]+a.box[2])/2, bx=(b.box[0]+b.box[2])/2;
      if(Math.abs(ax-bx)>tol) return ax-bx;          // clearly left vs right
      const ay=(a.box[1]+a.box[3])/2, by=(b.box[1]+b.box[3])/2;
      return ay-by;                                   // same column → top first
    });
    drawOverlay(); renderDetList();
    detList.style.display=detections.length?'block':'none';
    log(`<b>${selectedCluster} ・ 検出 ${detections.length}個</b>  推論${ms}ms`, detections.length?'ok':'err');
    if(!detections.length) append('トマトが検出されませんでした。明るさや距離を変えて撮り直してください。');
  }catch(e){ log('検出エラー:\n'+e.message,'err'); console.error(e); }
}

function drawOverlay(){
  if(!curImg) return;
  const iw=curImg.naturalWidth,ih=curImg.naturalHeight;
  ctx.drawImage(curImg,0,0);
  if(showMask){
    const ov=ctx.getImageData(0,0,iw,ih); const od=ov.data;
    detections.forEach(d=>{
      if(d.rejected) return;
      const set=d.num!=null; const cr=set?123:255,cg=set?191:90,cb=set?106:60;
      (d.maskCoords||[]).forEach(o=>{od[o]=od[o]*0.5+cr*0.5;od[o+1]=od[o+1]*0.5+cg*0.5;od[o+2]=od[o+2]*0.5+cb*0.5;});
    });
    ctx.putImageData(ov,0,0);
  }
  ctx.font=`bold ${Math.max(18,iw/32)}px -apple-system,sans-serif`;
  detections.forEach((d,idx)=>{
    if(d.rejected) return;
    const [x1,y1]=d.box;
    const label=d.num!=null?`#${d.num}`:`${idx+1}`;
    const color=d.num!=null?'#7bbf6a':'#ff5a3c';
    const tw=ctx.measureText(label).width+12,th=Math.max(24,iw/26);
    const lx=x1,ly=Math.max(th,y1);
    ctx.fillStyle=color; ctx.fillRect(lx,ly-th,tw,th);
    ctx.fillStyle='#14110e'; ctx.fillText(label,lx+6,ly-th*0.22);
  });
}

function renderDetList(){
  detItems.innerHTML='';
  detections.forEach((d,idx)=>{
    const item=document.createElement('div');
    item.className='det-item'+(d.rejected?' rejected':'');
    const hueTxt=d.hue>=0?`Hue ${d.hue.toFixed(1)}`:'Hue 測定不可';
    const numCell=d.rejected?`<div class="det-num set">誤検出</div>`
      :`<div class="det-num ${d.num!=null?'set':'unset'}">${d.num!=null?('#'+d.num):'番号'}</div>`;
    item.innerHTML=`<div class="det-swatch" style="background:${d.swatch}"></div>
      <div class="det-info"><b>${hueTxt}</b><br>確信度 ${(d.conf*100|0)}% ・ ${d.maskPx}px ${d.label?('・ '+d.label):''}</div>${numCell}`;
    item.addEventListener('click',()=>openModal(idx,true));
    detItems.appendChild(item);
  });
  saveBtn.disabled=!detections.some(d=>d.num!=null && !d.rejected);
}

$('maskToggle').addEventListener('change',e=>{showMask=e.target.checked;drawOverlay();});
function detAt(x,y){
  let best=-1,bestA=Infinity;
  detections.forEach((d,idx)=>{const [x1,y1,x2,y2]=d.box;
    if(x>=x1&&x<=x2&&y>=y1&&y<=y2){const a=(x2-x1)*(y2-y1);if(a<bestA){bestA=a;best=idx;}}});
  return best;
}
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect(),scale=cv.width/rect.width;
  const x=(e.clientX-rect.left)*scale,y=(e.clientY-rect.top)*scale;
  const idx=detAt(x,y); if(idx>=0) openModal(idx,true);
});

// ---------- assignment modal ----------
const modalBg=$('modalBg');
// numbers used so far in this capture (for quick re-pick)
function usedNumsThisPhoto(){
  return [...new Set(detections.filter(d=>d.num!=null).map(d=>d.num))];
}
function openModal(idx,fresh=false){
  activeIdx=idx; const d=detections[idx];
  $('modalSub').textContent=`Hue ${d.hue>=0?d.hue.toFixed(1):'—'} のトマトに番号と熟度を割り当てます。`;
  // suggest next number = max used +1
  const used=usedNumsThisPhoto().map(Number).filter(n=>!isNaN(n));
  const nextNum=used.length?Math.max(...used)+1:1;
  const pn=$('prevNums'); pn.innerHTML='';
  const grid=document.createElement('div'); grid.className='numgrid';
  // quick buttons: 1..max(used+1, 5)
  const top=Math.max(nextNum,5);
  for(let i=1;i<=top;i++){
    const b=document.createElement('button'); b.textContent='#'+i;
    if(String(d.num)===String(i)) b.classList.add('sel');
    b.onclick=()=>assignNum(i);
    grid.appendChild(b);
  }
  pn.appendChild(grid);
  const lr=$('labelRow'); lr.innerHTML='';
  const suggested=hueToLabel(d.hue);
  LABELS.forEach(l=>{
    const b=document.createElement('button');
    b.innerHTML=`${l}<br><span style="font-size:10px;color:var(--muted)">${LABEL_RANGES[l]}</span>`;
    if(d.label===l) b.classList.add('sel');
    if(d.label==null && l===suggested) b.style.borderColor='var(--accent)';
    b.onclick=()=>{ detections[idx].label=(detections[idx].label===l?null:l); openModal(idx); renderDetList(); };
    lr.appendChild(b);
  });
  const rj=$('modalReject');
  if(d.rejected){rj.classList.add('on');rj.textContent='誤検出を取り消す';}
  else{rj.classList.remove('on');rj.textContent='誤検出にする';}
  const cur=$('curAssign');
  cur.textContent=d.num!=null?`現在: #${d.num}${d.label?(' ・ '+d.label):''}`:(d.label?`現在: ${d.label}（番号未設定）`:'番号未設定');
  if(fresh) $('newNumInput').value='';
  modalBg.style.display='flex';
}
function assignNum(n){
  if(activeIdx<0) return; n=String(n).trim(); if(!n) return;
  detections[activeIdx].num=n;
  drawOverlay(); renderDetList(); openModal(activeIdx);
}
$('newNumBtn').onclick=()=>{const v=$('newNumInput').value.trim(); if(v) assignNum(v);};
$('modalReject').onclick=()=>{ if(activeIdx<0)return;
  detections[activeIdx].rejected=!detections[activeIdx].rejected; openModal(activeIdx); drawOverlay(); renderDetList(); };
$('modalClear').onclick=()=>{ if(activeIdx>=0){detections[activeIdx].num=null;detections[activeIdx].label=null;}
  modalBg.style.display='none'; drawOverlay(); renderDetList(); };
$('modalDone').onclick=()=>{ modalBg.style.display='none'; };
modalBg.addEventListener('click',e=>{ if(e.target===modalBg) modalBg.style.display='none'; });

// ---------- save ----------
saveBtn.addEventListener('click',async()=>{
  const date=todayStr();
  const toSave=detections.filter(d=>d.num!=null && !d.rejected);
  if(!toSave.length){ log('番号を割り当てたトマトがありません。','err'); return; }
  // one photo per capture; store under a unique id
  let photoId='';
  if(curPhotoDataUrl && db){
    photoId=`${selectedCluster}_${date}_${Date.now()}`;
    try{ await putPhoto(photoId,curPhotoDataUrl); }catch(e){ photoId=''; }
    // save overlay (normalized boxes, mask grids, numbers, labels) for redrawing in records
    if(photoId){
      try{
        const iw=detections[0]?.imgW||1, ih=detections[0]?.imgH||1;
        const items=toSave.map(d=>({
          num:String(d.num), label:d.label||'',
          box:[d.box[0]/iw, d.box[1]/ih, d.box[2]/iw, d.box[3]/ih],
          grid:d.grid, gridN:d.gridN
        }));
        await putOverlay(photoId,{items});
      }catch(e){}
    }
  }
  let added=0;
  toSave.forEach(d=>{
    records.push({
      cluster:selectedCluster, date, num:String(d.num),
      hue:d.hue>=0?d.hue.toFixed(2):'', label:d.label||'',
      conf:d.conf.toFixed(3), maskpx:d.maskPx, photoId
    });
    added++;
  });
  saveMeta(); refreshSavedCount();
  log(`<b>記録しました</b>  ${selectedCluster} ・ ${date} に ${added}個。合計 ${records.length}件。`,'ok');
  append('「記録」タブで房→日付→個体とたどって確認できます。');
  detections=[]; detItems.innerHTML=''; detList.style.display='none';
  cwrap.style.display='none'; hint.style.display='none'; saveBtn.disabled=true;
  curPhotoDataUrl=null;
});

// ---------- CSV export ----------
function recordsToCSV(){
  const head='cluster,date,num,hue,label,conf,maskpx';
  const lines=records.map(r=>[r.cluster,r.date,r.num,r.hue,r.label,r.conf,r.maskpx].join(','));
  return [head,...lines].join('\n');
}
$('exportBtn').addEventListener('click',()=>{
  if(!records.length){ log('まだ記録がありません。','err'); return; }
  const blob=new Blob([recordsToCSV()],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`tomato_hue_${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  log('CSVを書き出しました。','ok');
});

// ---------- records browser (3 levels) ----------
let navState={level:'clusters', cluster:null, date:null, photoId:null}; // levels: clusters / dates / sessions / individuals

function setCrumbs(){
  const c=$('crumbs'); c.innerHTML='';
  const mk=(label,fn)=>{const a=document.createElement('a');a.href='#';a.textContent=label;a.onclick=e=>{e.preventDefault();fn();};return a;};
  const sep=()=>{const s=document.createElement('span');s.textContent='›';return s;};
  c.appendChild(mk('房一覧',()=>{navState={level:'clusters',cluster:null,date:null,photoId:null};renderRecords();}));
  if(navState.cluster){ c.appendChild(sep());
    c.appendChild(mk(navState.cluster,()=>{navState={level:'dates',cluster:navState.cluster,date:null,photoId:null};renderRecords();})); }
  if(navState.date){ c.appendChild(sep());
    // make date a link if we are inside a session, otherwise plain text
    if(navState.photoId){
      c.appendChild(mk(navState.date,()=>{navState={level:'sessions',cluster:navState.cluster,date:navState.date,photoId:null};renderRecords();}));
    } else {
      const s=document.createElement('span');s.style.color='var(--text)';s.textContent=navState.date;c.appendChild(s);
    }
  }
  if(navState.photoId && navState.level==='individuals'){
    // show session label (時刻)
    c.appendChild(sep());
    const t=photoIdToTimeLabel(navState.photoId);
    const s=document.createElement('span');s.style.color='var(--text)';s.textContent=t;c.appendChild(s);
  }
}
// derive a short time label from photoId (format: cluster_date_timestamp)
function photoIdToTimeLabel(pid){
  const parts=String(pid).split('_');
  const ts=Number(parts[parts.length-1]);
  if(!isFinite(ts)) return '撮影回';
  const d=new Date(ts);
  const p=n=>String(n).padStart(2,'0');
  return `${p(d.getHours())}:${p(d.getMinutes())}`;
}

// delete all records (and orphaned photos) matching a filter
function deleteRecordsWhere(pred){
  const removed=records.filter(pred);
  const keptPhotoIds=new Set(records.filter(r=>!pred(r)).map(r=>r.photoId).filter(Boolean));
  records=records.filter(r=>!pred(r));
  // delete photos/overlays that no longer have any record
  const orphan=[...new Set(removed.map(r=>r.photoId).filter(Boolean))].filter(id=>!keptPhotoIds.has(id));
  orphan.forEach(id=>delPhoto(id));
  saveMeta(); refreshSavedCount();
}

async function renderRecords(){
  setCrumbs();
  const body=$('recordsBody'); body.innerHTML='';
  if(!records.length){
    body.innerHTML=`<div class="rec-empty">まだ記録がありません。<br>「撮影」タブで房を選んでトマトを記録すると、ここに房→日付→個体の順で表示されます。</div>`;
    return;
  }
  if(navState.level==='clusters'){
    // list clusters that have records
    const byC={}; records.forEach(r=>{(byC[r.cluster]=byC[r.cluster]||[]).push(r);});
    const names=clusters.filter(c=>byC[c]); // only clusters with data
    if(!names.length){ body.innerHTML=`<div class="rec-empty">記録のある房がまだありません。</div>`; return; }
    const grid=document.createElement('div'); grid.className='grid-cards';
    for(const c of names){
      const rs=byC[c];
      const dates=[...new Set(rs.map(r=>r.date))];
      // newest photo for thumbnail
      const withPhoto=rs.filter(r=>r.photoId).sort((a,b)=>b.date.localeCompare(a.date));
      const card=document.createElement('div'); card.className='folder';
      const fdel=document.createElement('button'); fdel.className='fdel'; fdel.textContent='✕';
      fdel.onclick=(e)=>{ e.stopPropagation();
        if(!confirm(`${c} を削除しますか?\n\n中の ${dates.length}日分・${rs.length}件の記録と写真もすべて消えます。`)) return;
        deleteRecordsWhere(r=>r.cluster===c); renderRecords();
      };
      card.appendChild(fdel);
      const thumb=document.createElement('div'); thumb.className='thumb empty'; thumb.textContent='🍅';
      card.appendChild(thumb);
      const meta=document.createElement('div'); meta.className='fmeta';
      meta.innerHTML=`<div class="t">${c}</div><div class="s">${dates.length}日分 ・ ${rs.length}件</div>`;
      card.appendChild(meta);
      card.onclick=()=>{ navState={level:'dates',cluster:c,date:null,photoId:null}; renderRecords(); };
      grid.appendChild(card);
      if(withPhoto[0]){ getPhoto(withPhoto[0].photoId).then(du=>{ if(du){
        const im=document.createElement('img'); im.className='thumb'; im.src=du;
        thumb.replaceWith(im);
      }}); }
    }
    body.appendChild(grid);
  }
  else if(navState.level==='dates'){
    const rs=records.filter(r=>r.cluster===navState.cluster);
    const byD={}; rs.forEach(r=>{(byD[r.date]=byD[r.date]||[]).push(r);});
    const dates=Object.keys(byD).sort((a,b)=>b.localeCompare(a)); // newest first
    const grid=document.createElement('div'); grid.className='grid-cards';
    for(const dt of dates){
      const drs=byD[dt];
      const photoRec=drs.find(r=>r.photoId);
      const card=document.createElement('div'); card.className='folder';
      const fdel=document.createElement('button'); fdel.className='fdel'; fdel.textContent='✕';
      fdel.onclick=(e)=>{ e.stopPropagation();
        if(!confirm(`${navState.cluster} の ${dt} を削除しますか?\n\nこの日の ${drs.length}個体の記録と写真が消えます。`)) return;
        deleteRecordsWhere(r=>r.cluster===navState.cluster && r.date===dt); renderRecords();
      };
      card.appendChild(fdel);
      const thumb=document.createElement('div'); thumb.className='thumb empty'; thumb.textContent='📅';
      card.appendChild(thumb);
      const meta=document.createElement('div'); meta.className='fmeta';
      meta.innerHTML=`<div class="t">${dt}</div><div class="s">${drs.length}個体</div>`;
      card.appendChild(meta);
      card.onclick=()=>{
        // count distinct sessions (photoIds, plus a synthetic '' bucket for records without photo)
        const sess=[...new Set(drs.map(r=>r.photoId||''))];
        if(sess.length>1){
          navState={level:'sessions',cluster:navState.cluster,date:dt,photoId:null};
        } else {
          navState={level:'individuals',cluster:navState.cluster,date:dt,photoId:sess[0]||null};
        }
        renderRecords();
      };
      grid.appendChild(card);
      if(photoRec){ getPhoto(photoRec.photoId).then(du=>{ if(du){
        const im=document.createElement('img'); im.className='thumb'; im.src=du; thumb.replaceWith(im);
      }}); }
    }
    body.appendChild(grid);
  }
  else if(navState.level==='sessions'){
    const drs=records.filter(r=>r.cluster===navState.cluster && r.date===navState.date);
    // group by photoId (synthetic '' for records without photo)
    const byP={}; drs.forEach(r=>{(byP[r.photoId||'']=byP[r.photoId||'']||[]).push(r);});
    // session order: by timestamp embedded in photoId (no-photo bucket last)
    const pids=Object.keys(byP).sort((a,b)=>{
      if(a===''&&b!=='') return 1;
      if(b===''&&a!=='') return -1;
      const ta=Number(String(a).split('_').pop()), tb=Number(String(b).split('_').pop());
      return (isFinite(ta)?ta:0)-(isFinite(tb)?tb:0);
    });
    const grid=document.createElement('div'); grid.className='grid-cards';
    pids.forEach((pid,i)=>{
      const recs=byP[pid];
      const card=document.createElement('div'); card.className='folder';
      const fdel=document.createElement('button'); fdel.className='fdel'; fdel.textContent='✕';
      fdel.onclick=(e)=>{ e.stopPropagation();
        const label=pid?photoIdToTimeLabel(pid):'写真なし';
        if(!confirm(`${navState.cluster} ${navState.date} の ${i+1}回目（${label}）を削除しますか?\n\n${recs.length}個体の記録と写真が消えます。`)) return;
        deleteRecordsWhere(r=>r.cluster===navState.cluster && r.date===navState.date && (r.photoId||'')===pid);
        renderRecords();
      };
      card.appendChild(fdel);
      const thumb=document.createElement('div'); thumb.className='thumb empty'; thumb.textContent='⏱';
      card.appendChild(thumb);
      const meta=document.createElement('div'); meta.className='fmeta';
      const tlabel=pid?photoIdToTimeLabel(pid):'写真なし';
      meta.innerHTML=`<div class="t">${i+1}回目 ・ ${tlabel}</div><div class="s">${recs.length}個体</div>`;
      card.appendChild(meta);
      card.onclick=()=>{ navState={level:'individuals',cluster:navState.cluster,date:navState.date,photoId:pid||null}; renderRecords(); };
      grid.appendChild(card);
      if(pid){ getPhoto(pid).then(du=>{ if(du){const im=document.createElement('img');im.className='thumb';im.src=du;thumb.replaceWith(im);} }); }
    });
    body.appendChild(grid);
  }
  else if(navState.level==='individuals'){
    const drs=records.filter(r=>r.cluster===navState.cluster && r.date===navState.date
      && (navState.photoId==null || (r.photoId||'')===navState.photoId));
    // big photo for this session (or first available for the day) with number+mask overlay and a toggle
    const photoRec = navState.photoId ? drs.find(r=>r.photoId===navState.photoId) : drs.find(r=>r.photoId);
    if(photoRec){
      const du=await getPhoto(photoRec.photoId);
      const ov=await getOverlay(photoRec.photoId);
      if(du){
        const wrap=document.createElement('div');
        wrap.style.marginBottom='14px';
        const cvr=document.createElement('canvas'); cvr.className='big-photo'; cvr.style.marginBottom='8px';
        wrap.appendChild(cvr);
        if(ov && ov.items && ov.items.length){
          const tgl=document.createElement('label');
          tgl.style.cssText='display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text)';
          tgl.innerHTML='<input type="checkbox" id="recOvToggle" checked style="width:18px;height:18px">番号・マスクを表示';
          wrap.appendChild(tgl);
        }
        body.appendChild(wrap);
        const img=new Image();
        img.onload=()=>{
          const draw=(showOv)=>{
            const W=img.naturalWidth,H=img.naturalHeight;
            cvr.width=W; cvr.height=H;
            const c=cvr.getContext('2d');
            c.drawImage(img,0,0);
            if(showOv && ov && ov.items){
              // masks first
              ov.items.forEach(it=>{
                if(!it.grid) return;
                const N=it.gridN||28;
                const x1=it.box[0]*W,y1=it.box[1]*H,x2=it.box[2]*W,y2=it.box[3]*H;
                const cw=(x2-x1)/N, ch=(y2-y1)/N;
                c.fillStyle='rgba(123,191,106,0.45)';
                for(let gj=0;gj<N;gj++)for(let gi=0;gi<N;gi++){
                  if(it.grid[gj*N+gi]==='1') c.fillRect(x1+gi*cw, y1+gj*ch, cw+0.5, ch+0.5);
                }
              });
              // labels
              c.font=`bold ${Math.max(20,W/30)}px -apple-system,sans-serif`;
              ov.items.forEach(it=>{
                const x1=it.box[0]*W,y1=it.box[1]*H;
                const label=`#${it.num}`;
                const tw=c.measureText(label).width+12, th=Math.max(26,W/24);
                c.fillStyle='#7bbf6a'; c.fillRect(x1,Math.max(th,y1)-th,tw,th);
                c.fillStyle='#14110e'; c.fillText(label,x1+6,Math.max(th,y1)-th*0.22);
              });
            }
          };
          draw(true);
          const t=$('recOvToggle'); if(t) t.addEventListener('change',e=>draw(e.target.checked));
        };
        img.src=du;
      }
    }
    // individuals sorted numerically
    drs.sort((a,b)=>Number(a.num)-Number(b.num));
    drs.forEach((r)=>{
      const gi=records.indexOf(r);
      const hue=r.hue!==''?Number(r.hue):-1;
      // trend across all dates for this individual in this cluster
      const hist=records.filter(x=>x.cluster===r.cluster && x.num===r.num && x.hue!=='')
        .sort((a,b)=>a.date.localeCompare(b.date));
      let trend='';
      if(hist.length>1){
        const first=Number(hist[0].hue),last=Number(hist[hist.length-1].hue);
        const d=last-first;
        trend=` ・ 通算 ${d>=0?'+':''}${d.toFixed(1)}（${hist.length}日）`;
      }
      const row=document.createElement('div'); row.className='rec-row';
      row.innerHTML=`<div class="rnum">#${r.num}</div>
        <div class="rhue" style="color:${colorForHue(hue)}">${hue>=0?hue.toFixed(1):'—'}<span style="font-size:11px;color:var(--muted);font-weight:400">${trend}</span></div>
        ${r.label?`<div class="rlabel">${r.label}</div>`:''}
        <button class="rdel" title="削除">✕</button>`;
      row.querySelector('.rdel').onclick=async(e)=>{
        e.stopPropagation();
        if(!confirm(`この記録を削除しますか?\n\n${r.cluster} ・ ${r.date} ・ #${r.num} ・ Hue ${r.hue||'—'}`)) return;
        records.splice(gi,1);
        // if no record uses this photo anymore, delete it from storage
        if(r.photoId && !records.some(x=>x.photoId===r.photoId)) delPhoto(r.photoId);
        saveMeta(); refreshSavedCount();
        renderRecords();
      };
      body.appendChild(row);
    });
  }
}

function switchTab(which){
  const cap=which==='capture';
  $('tabCapture').classList.toggle('active',cap);
  $('tabRecords').classList.toggle('active',!cap);
  $('captureView').style.display=cap?'block':'none';
  $('recordsView').style.display=cap?'none':'block';
  if(!cap){ navState={level:'clusters',cluster:null,date:null,photoId:null}; renderRecords(); }
}
$('tabCapture').onclick=()=>switchTab('capture');
$('tabRecords').onclick=()=>switchTab('records');

init();
</script>
</body>
