<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>トマトHue記録</title>
<style>
  :root {
    --bg: #14110e;
    --panel: #1f1a15;
    --panel2: #271f18;
    --line: #3a322a;
    --text: #f3ede4;
    --muted: #a89d8d;
    --accent: #ff5a3c;
    --accent-dim: #c7402a;
    --ok: #7bbf6a;
    --blue: #5aa9ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  header {
    padding: 14px 16px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 650; }
  header .date { font-size: 13px; color: var(--muted); }
  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--line);
    position: sticky; top: 53px; background: var(--bg); z-index: 9;
  }
  .tab {
    flex: 1; border: none; border-radius: 0; background: transparent;
    color: var(--muted); font-size: 15px; font-weight: 650; padding: 14px;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .rec-card {
    border: 1px solid var(--line); border-radius: 14px; margin-bottom: 14px;
    background: var(--panel); overflow: hidden;
  }
  .rec-head {
    display: flex; align-items: center; gap: 10px; padding: 14px 16px;
    border-bottom: 1px solid var(--line); background: var(--panel2);
  }
  .rec-head .badge {
    width: 40px; height: 40px; border-radius: 10px; flex: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #14110e; background: var(--accent);
  }
  .rec-head .rec-meta { flex: 1; }
  .rec-head .rec-meta .t { font-size: 16px; font-weight: 700; }
  .rec-head .rec-meta .s { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .rec-rows { padding: 6px 8px 10px; }
  .rec-row {
    display: flex; align-items: center; gap: 12px; padding: 11px 8px;
    border-bottom: 1px solid var(--line);
  }
  .rec-row:last-child { border-bottom: none; }
  .rec-row .rdate { font-size: 14px; color: var(--muted); width: 92px; flex: none; }
  .rec-row .rhue { font-size: 20px; font-weight: 750; flex: 1; }
  .rec-row .rdelta { font-size: 13px; font-weight: 650; width: 64px; text-align: right; flex: none; }
  .rec-row .rdelta.down { color: var(--accent); }
  .rec-row .rdelta.up { color: var(--ok); }
  .rec-row .rlabel {
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--muted); flex: none;
  }
  .rec-empty { color: var(--muted); font-size: 14px; text-align: center; padding: 40px 16px; line-height: 1.7; }
  main { padding: 16px; max-width: 760px; margin: 0 auto; padding-bottom: 120px; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  button {
    appearance: none; border: 1px solid var(--line); border-radius: 12px;
    background: var(--panel); color: var(--text);
    font-size: 15px; font-weight: 600; padding: 14px; cursor: pointer;
  }
  button:active { background: var(--panel2); }
  button.primary { background: var(--accent); color: #1a0f0b; border-color: transparent; }
  button.primary:active { background: var(--accent-dim); }
  button.primary:disabled { background: #4a423a; color: var(--muted); }
  button.ghost { background: transparent; }
  .status {
    margin-top: 12px; padding: 10px 12px; border-radius: 10px;
    background: var(--panel); border: 1px solid var(--line);
    font-size: 12.5px; line-height: 1.6; color: var(--muted);
    white-space: pre-wrap; word-break: break-word;
  }
  .status .ok { color: var(--ok); } .status .err { color: var(--accent); }
  .canvas-wrap {
    margin-top: 14px; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--line); background: #000; display: none; position: relative;
  }
  canvas { width: 100%; display: block; touch-action: none; }
  .hint {
    margin-top: 10px; font-size: 12.5px; color: var(--muted); line-height: 1.6;
  }
  input[type=file] { display: none; }
  .det-list { margin-top: 14px; display: none; }
  .det-list h3 { font-size: 13px; color: var(--muted); margin: 0 0 8px; font-weight: 600; }
  .det-item {
    display: flex; align-items: center; gap: 10px; padding: 10px;
    border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px;
    background: var(--panel);
  }
  .det-swatch { width: 34px; height: 34px; border-radius: 8px; flex: none; border: 1px solid var(--line); }
  .det-info { flex: 1; font-size: 13px; line-height: 1.45; }
  .det-info b { font-size: 15px; }
  .det-num {
    width: 46px; height: 40px; flex: none; border-radius: 8px;
    background: var(--panel2); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700;
  }
  .det-num.unset { color: var(--muted); }
  .det-num.set { color: var(--accent); border-color: var(--accent); }
  select {
    appearance: none; background: var(--panel2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 8px;
    font-size: 13px; width: 100%;
  }
  .footer-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 22%);
    display: flex; gap: 10px; max-width: 760px; margin: 0 auto;
  }
  .footer-bar button { flex: 1; }
  .saved-count { font-size: 12px; color: var(--muted); text-align: center; margin-top: 6px; }

  /* number pad modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: flex-end; z-index: 50;
  }
  .modal {
    background: var(--panel); width: 100%; border-radius: 18px 18px 0 0;
    padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--line);
  }
  .modal h3 { margin: 0 0 4px; font-size: 16px; }
  .modal p { margin: 0 0 14px; font-size: 12.5px; color: var(--muted); }
  .numgrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 12px; }
  .numgrid button { padding: 14px 0; font-size: 17px; }
  .numgrid button.prev { border-color: var(--accent); color: var(--accent); }
  .new-num { display: flex; gap: 8px; margin-bottom: 12px; }
  .new-num input {
    flex: 1; background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px; font-size: 16px;
  }
  .label-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .label-row button { flex: 1; padding: 12px 4px; font-size: 13px; }
  .label-row button.sel { background: var(--accent); color: #1a0f0b; border-color: transparent; }
  .modal .modal-actions { display: flex; gap: 10px; }
  #modalReject.on { background: var(--accent); color: #1a0f0b; border-color: transparent; }
  .det-item.rejected { opacity: 0.4; }
  .det-item.rejected .det-num { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>トマトHue記録</h1>
  <span class="date" id="dateLabel"></span>
</header>
<nav class="tabs">
  <button class="tab active" id="tabCapture">撮影</button>
  <button class="tab" id="tabRecords">記録</button>
</nav>
<main>
 <section id="captureView">
  <button class="primary" id="pickBtn" disabled>読み込み中…</button>
  <input type="file" id="file" accept="image/*" capture="environment">

  <div class="status" id="status">起動中…</div>

  <div class="canvas-wrap" id="cwrap"><canvas id="cv"></canvas></div>
  <div class="hint" id="hint" style="display:none">
    検出された各トマトをタップ → 個体番号と熟度を割り当て。前日の番号があれば思い出して同じ番号を振ってください。誤検出にしたいトマトはタップして「誤検出にする」を押してください。
    <div style="margin-top:10px">
      <label style="display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text)">
        <input type="checkbox" id="maskToggle" checked style="width:18px;height:18px">
        計測範囲(マスク)を表示
      </label>
    </div>
  </div>

  <div class="det-list" id="detList">
    <h3>検出されたトマト</h3>
    <div id="detItems"></div>
  </div>
 </section>

 <section id="recordsView" style="display:none">
  <div id="recordsBody"></div>
 </section>
</main>

<div class="footer-bar" id="footerBar" style="display:none">
  <button class="ghost" id="importBtn">CSV読込</button>
  <button class="ghost" id="exportBtn">CSV書出</button>
  <button class="primary" id="saveBtn" disabled>記録</button>
</div>
<input type="file" id="csvFile" accept=".csv,text/csv">
<div class="saved-count" id="savedCount" style="display:none"></div>

<!-- number assignment modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>個体番号と熟度</h3>
    <p id="modalSub">このトマトに番号を割り当てます。</p>
    <div id="prevNums"></div>
    <div class="new-num">
      <input type="number" id="newNumInput" placeholder="新しい番号" inputmode="numeric">
      <button id="newNumBtn" style="flex:none;padding:12px 16px">追加</button>
    </div>
    <div class="label-row" id="labelRow"></div>
    <div class="modal-actions">
      <button class="ghost" id="modalReject" style="flex:1">誤検出にする</button>
      <button class="ghost" id="modalClear" style="flex:none;padding:12px 16px">解除</button>
      <button class="ghost" id="modalCancel" style="flex:none;padding:12px 16px">閉じる</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
<script>
const MODEL_URL = 'best_q.onnx';
const IMG = 640, CONF = 0.35, MASK_THR = 0.5, IOU_DEDUP = 0.7;
const LABELS = ['Green', 'Yellow', 'Orange', 'Red'];
const LABEL_RANGES = {
  'Green':  '60–160',
  'Yellow': '40–60',
  'Orange': '16–40',
  'Red':    '0–16 / 340–360'
};
// classify a hue (0..360) into a color label, or '' if undefined
function hueToLabel(h){
  if(h<0) return '';
  if((h>=0&&h<16)||(h>=340&&h<=360)) return 'Red';
  if(h>=16&&h<40) return 'Orange';
  if(h>=40&&h<60) return 'Yellow';
  if(h>=60&&h<160) return 'Green';
  return ''; // 160..340 outside tomato range
}

// ---------- state ----------
let session = null;
let detections = [];   // {box(orig coords), conf, maskPixels, hue, num, label}
let prevNums = [];     // remembered individual numbers from past records
let records = [];      // accumulated CSV rows {date,num,hue,label,conf,maskpx}
let activeIdx = -1;    // which detection is being edited in modal
let showMask = true;   // overlay measured mask pixels

const $ = id => document.getElementById(id);
const statusEl=$('status'), pickBtn=$('pickBtn'), fileEl=$('file');
const cv=$('cv'), cwrap=$('cwrap'), ctx=cv.getContext('2d',{willReadFrequently:true});
const detList=$('detList'), detItems=$('detItems'), hint=$('hint');
const footerBar=$('footerBar'), saveBtn=$('saveBtn'), savedCount=$('savedCount');

function todayStr(){
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
$('dateLabel').textContent = todayStr();

function log(msg,cls){ statusEl.innerHTML = cls?`<span class="${cls}">${msg}</span>`:msg; }
function append(msg,cls){ statusEl.innerHTML += '\n'+(cls?`<span class="${cls}">${msg}</span>`:msg); }

// ---------- persistence (best-effort; CSV is the source of truth) ----------
function saveLocal(){
  try{
    localStorage.setItem('tomato_records', JSON.stringify(records));
    localStorage.setItem('tomato_prevnums', JSON.stringify(prevNums));
  }catch(e){}
}
function loadLocal(){
  try{
    const r=localStorage.getItem('tomato_records'); if(r) records=JSON.parse(r);
    const p=localStorage.getItem('tomato_prevnums'); if(p) prevNums=JSON.parse(p);
  }catch(e){}
}
function refreshSavedCount(){
  savedCount.style.display='block';
  savedCount.textContent = `保存済みデータ: ${records.length}行  /  既知の個体番号: ${prevNums.length>0?prevNums.join(', '):'なし'}`;
}

// ---------- model ----------
async function init(){
  loadLocal();
  refreshSavedCount();
  try{
    log('モデルを読み込んでいます…(初回は数十秒かかることがあります)');
    ort.env.wasm.numThreads = 1; ort.env.wasm.simd = true;
    session = await ort.InferenceSession.create(MODEL_URL,{
      executionProviders:['wasm'], graphOptimizationLevel:'all'
    });
    log('準備完了。房を撮影してください。','ok');
    pickBtn.textContent='房を撮影 / 写真を選ぶ';
    pickBtn.disabled=false;
    footerBar.style.display='flex';
  }catch(e){ log('モデル読み込み失敗:\n'+e.message,'err'); }
}

pickBtn.addEventListener('click',()=>fileEl.click());
fileEl.addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const img=new Image();
  img.onload=()=>{ runDetection(img); URL.revokeObjectURL(img.src); };
  img.onerror=()=>log('画像を開けませんでした。','err');
  img.src=URL.createObjectURL(f); fileEl.value='';
});

function letterbox(img){
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const r=Math.min(IMG/iw,IMG/ih), nw=Math.round(iw*r), nh=Math.round(ih*r);
  const dx=Math.floor((IMG-nw)/2), dy=Math.floor((IMG-nh)/2);
  const off=document.createElement('canvas'); off.width=IMG; off.height=IMG;
  const octx=off.getContext('2d',{willReadFrequently:true});
  octx.fillStyle='#727272'; octx.fillRect(0,0,IMG,IMG);
  octx.drawImage(img,0,0,iw,ih,dx,dy,nw,nh);
  return {octx,r,dx,dy};
}
function toTensor(octx){
  const {data}=octx.getImageData(0,0,IMG,IMG);
  const arr=new Float32Array(3*IMG*IMG), plane=IMG*IMG;
  for(let i=0;i<plane;i++){
    arr[i]=data[i*4]/255; arr[plane+i]=data[i*4+1]/255; arr[2*plane+i]=data[i*4+2]/255;
  }
  return new ort.Tensor('float32',arr,[1,3,IMG,IMG]);
}
const sigmoid=x=>1/(1+Math.exp(-x));
function iou(a,b){
  const x1=Math.max(a[0],b[0]),y1=Math.max(a[1],b[1]);
  const x2=Math.min(a[2],b[2]),y2=Math.min(a[3],b[3]);
  const w=Math.max(0,x2-x1),h=Math.max(0,y2-y1),inter=w*h;
  const ua=(a[2]-a[0])*(a[3]-a[1])+(b[2]-b[0])*(b[3]-b[1])-inter;
  return ua>0?inter/ua:0;
}
// RGB -> Hue in 0..360
function rgb2hue(r,g,b){
  r/=255; g/=255; b/=255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  if(d===0) return -1; // gray: undefined hue, skip
  let h;
  if(mx===r) h=((g-b)/d)%6;
  else if(mx===g) h=(b-r)/d+2;
  else h=(r-g)/d+4;
  h*=60; if(h<0) h+=360;
  return h;
}

let curImg=null, lbInfo=null;

async function runDetection(img){
  try{
    curImg=img;
    detList.style.display='none'; detItems.innerHTML=''; detections=[];
    saveBtn.disabled=true;
    log('前処理中…');
    const lb=letterbox(img); lbInfo=lb;
    const tensor=toTensor(lb.octx);
    log('YOLO推論中…');
    const t0=performance.now();
    const out=await session.run({images:tensor});
    const ms=Math.round(performance.now()-t0);

    const o0=out['output0'], o1=out['output1'];
    const det=o0.data, proto=o1.data;
    const NROW=o0.dims[1], NCOL=o0.dims[2];
    const PC=o1.dims[1], PH=o1.dims[2], PW=o1.dims[3];

    let dets=[];
    for(let i=0;i<NROW;i++){
      const base=i*NCOL, conf=det[base+4];
      if(conf<CONF) continue;
      const box=[det[base],det[base+1],det[base+2],det[base+3]];
      const coef=new Float32Array(32);
      for(let k=0;k<32;k++) coef[k]=det[base+6+k];
      dets.push({box,conf,coef});
    }
    dets.sort((a,b)=>b.conf-a.conf);
    const keep=[];
    for(const d of dets){ if(keep.some(k=>iou(k.box,d.box)>IOU_DEDUP)) continue; keep.push(d); }

    const iw=img.naturalWidth, ih=img.naturalHeight;
    cv.width=iw; cv.height=ih; ctx.drawImage(img,0,0);
    cwrap.style.display='block'; hint.style.display='block';

    const inv=(x,y)=>[(x-lb.dx)/lb.r,(y-lb.dy)/lb.r];
    const src=ctx.getImageData(0,0,iw,ih).data; // original pixels for hue
    const protoPlane=PH*PW;

    keep.forEach((d,idx)=>{
      const [bx1,by1]=inv(d.box[0],d.box[1]);
      const [bx2,by2]=inv(d.box[2],d.box[3]);
      const ox1=Math.max(0,Math.floor(bx1)),oy1=Math.max(0,Math.floor(by1));
      const ox2=Math.min(iw,Math.ceil(bx2)),oy2=Math.min(ih,Math.ceil(by2));
      let cntH=0,maskPx=0;
      // accumulate hue via circular mean to be safe near 0/360 wrap
      let sx=0, sy=0;
      const maskCoords=[];
      // bilinear sample of the prototype-combined mask at fractional (gx,gy) in 160-grid
      const maskAt=(gx,gy)=>{
        const x0=Math.floor(gx), y0=Math.floor(gy);
        const x1=Math.min(PW-1,x0+1), y1=Math.min(PH-1,y0+1);
        const fx=gx-x0, fy=gy-y0;
        const xa=Math.max(0,Math.min(PW-1,x0)), ya=Math.max(0,Math.min(PH-1,y0));
        let v00=0,v10=0,v01=0,v11=0;
        const p00=ya*PW+xa, p10=ya*PW+x1, p01=y1*PW+xa, p11=y1*PW+x1;
        for(let c=0;c<PC;c++){
          const cp=c*protoPlane;
          v00+=d.coef[c]*proto[cp+p00];
          v10+=d.coef[c]*proto[cp+p10];
          v01+=d.coef[c]*proto[cp+p01];
          v11+=d.coef[c]*proto[cp+p11];
        }
        const top=v00*(1-fx)+v10*fx, bot=v01*(1-fx)+v11*fx;
        return sigmoid(top*(1-fy)+bot*fy);
      };
      for(let oy=oy1;oy<oy2;oy++){
        for(let ox=ox1;ox<ox2;ox++){
          const lx=ox*lb.r+lb.dx, ly=oy*lb.r+lb.dy;
          const gx=lx/IMG*PW, gy=ly/IMG*PH;
          if(maskAt(gx,gy)>MASK_THR){
            maskPx++;
            const o=(oy*iw+ox)*4;
            const h=rgb2hue(src[o],src[o+1],src[o+2]);
            if(h>=0){ const rad=h*Math.PI/180; sx+=Math.cos(rad); sy+=Math.sin(rad); cntH++; }
            maskCoords.push(o);
          }
        }
      }
      let hue=-1;
      if(cntH>0){ let a=Math.atan2(sy/cntH,sx/cntH)*180/Math.PI; if(a<0)a+=360; hue=a; }
      // swatch color = average rgb of mask
      let rr=0,gg=0,bb=0;
      maskCoords.forEach(o=>{rr+=src[o];gg+=src[o+1];bb+=src[o+2];});
      const n=maskCoords.length||1;
      const swatch=`rgb(${rr/n|0},${gg/n|0},${bb/n|0})`;
      detections.push({
        box:[bx1,by1,bx2,by2], conf:d.conf, maskPx, hue,
        swatch, num:null, label:null, maskCoords
      });
    });

    drawOverlay();
    renderDetList();
    detList.style.display = detections.length?'block':'none';
    log(`<b>検出 ${detections.length}個</b>  推論${ms}ms`, detections.length?'ok':'err');
    if(detections.length===0) append('トマトが検出されませんでした。明るさや距離を変えて撮り直してください。');
  }catch(e){ log('検出エラー:\n'+e.message,'err'); console.error(e); }
}

function drawOverlay(){
  if(!curImg) return;
  const iw=curImg.naturalWidth, ih=curImg.naturalHeight;
  ctx.drawImage(curImg,0,0);

  // optionally paint masks so you can see exactly which pixels are measured
  if(showMask){
    const ov=ctx.getImageData(0,0,iw,ih); const od=ov.data;
    detections.forEach(d=>{
      if(d.rejected) return; // rejected: hide mask on the image completely
      const set = d.num!=null;
      const cr = set?123:255, cg = set?191:90, cb = set?106:60; // green if numbered, orange if not
      (d.maskCoords||[]).forEach(o=>{
        od[o]   = od[o]*0.5 + cr*0.5;
        od[o+1] = od[o+1]*0.5 + cg*0.5;
        od[o+2] = od[o+2]*0.5 + cb*0.5;
      });
    });
    ctx.putImageData(ov,0,0);
  }

  ctx.font=`bold ${Math.max(18,iw/32)}px -apple-system, sans-serif`;
  detections.forEach((d,idx)=>{
    if(d.rejected) return; // rejected: no label on image
    const [x1,y1,x2,y2]=d.box;
    const label = d.num!=null ? `#${d.num}` : `${idx+1}`;
    const color = d.num!=null ? '#7bbf6a' : '#ff5a3c';
    const tw=ctx.measureText(label).width+12, th=Math.max(24,iw/26);
    // place label near top-left of the fruit, just inside the mask area
    const lx=x1, ly=Math.max(th, y1);
    ctx.fillStyle=color;
    ctx.fillRect(lx, ly-th, tw, th);
    ctx.fillStyle='#14110e';
    ctx.fillText(label, lx+6, ly-th*0.22);
  });
}

function renderDetList(){
  detItems.innerHTML='';
  detections.forEach((d,idx)=>{
    const item=document.createElement('div');
    item.className='det-item'+(d.rejected?' rejected':'');
    const hueTxt = d.hue>=0 ? `Hue ${d.hue.toFixed(1)}` : 'Hue 測定不可';
    const numCell = d.rejected
      ? `<div class="det-num set">誤検出</div>`
      : `<div class="det-num ${d.num!=null?'set':'unset'}">${d.num!=null?('#'+d.num):'番号'}</div>`;
    item.innerHTML=`
      <div class="det-swatch" style="background:${d.swatch}"></div>
      <div class="det-info">
        <b>${hueTxt}</b><br>
        確信度 ${(d.conf*100|0)}% ・ ${d.maskPx}px ${d.label?('・ '+d.label):''}
      </div>
      ${numCell}
    `;
    item.addEventListener('click',()=>openModal(idx));
    detItems.appendChild(item);
  });
  // enable save if at least one non-rejected detection has a number
  saveBtn.disabled = !detections.some(d=>d.num!=null && !d.rejected);
}

// allow tapping the canvas to open the nearest detection
$('maskToggle').addEventListener('change',e=>{ showMask=e.target.checked; drawOverlay(); });

// find smallest detection whose box contains the point
function detAt(x,y){
  let best=-1,bestA=Infinity;
  detections.forEach((d,idx)=>{
    const [x1,y1,x2,y2]=d.box;
    if(x>=x1&&x<=x2&&y>=y1&&y<=y2){
      const a=(x2-x1)*(y2-y1); if(a<bestA){bestA=a;best=idx;}
    }
  });
  return best;
}
function evtToCanvas(e){
  const rect=cv.getBoundingClientRect();
  const scale=cv.width/rect.width;
  return [ (e.clientX-rect.left)*scale, (e.clientY-rect.top)*scale ];
}

// tap a detection on the image to open its number/label/reject panel
cv.addEventListener('click',e=>{
  const [x,y]=evtToCanvas(e);
  const idx=detAt(x,y);
  if(idx>=0) openModal(idx);
});

// ---------- modal ----------
const modalBg=$('modalBg');
function openModal(idx){
  activeIdx=idx;
  const d=detections[idx];
  $('modalSub').textContent = `Hue ${d.hue>=0?d.hue.toFixed(1):'—'} のトマトに番号と熟度を割り当てます。`;
  // previous numbers
  const pn=$('prevNums'); pn.innerHTML='';
  if(prevNums.length){
    const grid=document.createElement('div'); grid.className='numgrid';
    prevNums.forEach(n=>{
      const b=document.createElement('button'); b.className='prev'; b.textContent='#'+n;
      b.onclick=()=>{ assignNum(n); };
      grid.appendChild(b);
    });
    pn.appendChild(grid);
  }
  // labels (with hue range hints; auto-suggested label is outlined)
  const lr=$('labelRow'); lr.innerHTML='';
  const suggested = hueToLabel(d.hue);
  LABELS.forEach(l=>{
    const b=document.createElement('button');
    b.innerHTML = `${l}<br><span style="font-size:10px;color:var(--muted)">${LABEL_RANGES[l]}</span>`;
    if(d.label===l) b.classList.add('sel');
    if(d.label==null && l===suggested) b.style.borderColor='var(--accent)';
    b.onclick=()=>{ detections[idx].label=l; openModal(idx); renderDetList(); };
    lr.appendChild(b);
  });
  // reject toggle button reflects current state
  const rj=$('modalReject');
  if(d.rejected){ rj.classList.add('on'); rj.textContent='誤検出を取り消す'; }
  else { rj.classList.remove('on'); rj.textContent='誤検出にする'; }
  $('newNumInput').value='';
  modalBg.style.display='flex';
}
function assignNum(n){
  if(activeIdx<0) return;
  detections[activeIdx].num=n;
  if(!prevNums.includes(n)){ prevNums.push(n); prevNums.sort((a,b)=>a-b); }
  modalBg.style.display='none';
  drawOverlay(); renderDetList();
}
$('newNumBtn').onclick=()=>{
  const v=parseInt($('newNumInput').value,10);
  if(Number.isFinite(v)) assignNum(v);
};
$('modalClear').onclick=()=>{
  if(activeIdx>=0){ detections[activeIdx].num=null; detections[activeIdx].label=null; }
  modalBg.style.display='none'; drawOverlay(); renderDetList();
};
$('modalReject').onclick=()=>{
  if(activeIdx<0) return;
  detections[activeIdx].rejected = !detections[activeIdx].rejected;
  openModal(activeIdx); drawOverlay(); renderDetList();
};
$('modalCancel').onclick=()=>{ modalBg.style.display='none'; };
modalBg.addEventListener('click',e=>{ if(e.target===modalBg) modalBg.style.display='none'; });

// ---------- save / CSV ----------
saveBtn.addEventListener('click',()=>{
  const date=todayStr();
  let added=0;
  detections.forEach(d=>{
    if(d.num==null || d.rejected) return;
    records.push({
      date, num:d.num,
      hue: d.hue>=0 ? d.hue.toFixed(2) : '',
      label: d.label||'',
      conf: (d.conf).toFixed(3),
      maskpx: d.maskPx
    });
    added++;
  });
  saveLocal(); refreshSavedCount();
  if($('recordsView').style.display!=='none') renderRecords();
  log(`<b>記録しました</b>  ${added}個を ${todayStr()} として追加。合計 ${records.length}行。`,'ok');
  append('「記録」タブで個体ごとの推移を確認できます。学習用にCSVも書き出せます。');
  // reset current photo state
  detections=[]; detItems.innerHTML=''; detList.style.display='none';
  cwrap.style.display='none'; hint.style.display='none'; saveBtn.disabled=true;
});

function recordsToCSV(){
  const head='date,num,hue,label,conf,maskpx';
  const lines=records.map(r=>[r.date,r.num,r.hue,r.label,r.conf,r.maskpx].join(','));
  return [head,...lines].join('\n');
}
$('exportBtn').addEventListener('click',()=>{
  if(records.length===0){ log('まだ記録がありません。','err'); return; }
  const blob=new Blob([recordsToCSV()],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`tomato_hue_${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  log('CSVを書き出しました。ファイルに保存してください。','ok');
});
$('importBtn').addEventListener('click',()=>$('csvFile').click());
$('csvFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const text=reader.result.trim();
      const rows=text.split(/\r?\n/);
      const start = rows[0].toLowerCase().startsWith('date,') ? 1 : 0;
      const imported=[];
      const nums=new Set(prevNums);
      for(let i=start;i<rows.length;i++){
        if(!rows[i].trim()) continue;
        const [date,num,hue,label,conf,maskpx]=rows[i].split(',');
        imported.push({date,num:Number(num),hue,label,conf,maskpx});
        if(num!=='') nums.add(Number(num));
      }
      records=imported;
      prevNums=[...nums].filter(n=>Number.isFinite(n)).sort((a,b)=>a-b);
      saveLocal(); refreshSavedCount();
      if($('recordsView').style.display!=='none') renderRecords();
      log(`CSVを読み込みました。${records.length}行・個体番号 ${prevNums.join(', ')||'なし'}。続きから追記できます。`,'ok');
    }catch(err){ log('CSV読み込み失敗: '+err.message,'err'); }
  };
  reader.readAsText(f); e.target.value='';
});

// ---------- tabs & records view ----------
function colorForHue(h){
  if(h<0) return 'var(--muted)';
  const lab=hueToLabel(h);
  if(lab==='Red') return '#ff5a3c';
  if(lab==='Orange') return '#ff9a3c';
  if(lab==='Yellow') return '#e8c84a';
  if(lab==='Green') return '#7bbf6a';
  return 'var(--muted)';
}
function renderRecords(){
  const body=$('recordsBody');
  if(!records.length){
    body.innerHTML=`<div class="rec-empty">まだ記録がありません。<br>「撮影」タブでトマトを記録すると、ここに個体ごとのHueの推移が表示されます。</div>`;
    return;
  }
  // group by num
  const byNum={};
  records.forEach(r=>{
    const n=String(r.num);
    (byNum[n]=byNum[n]||[]).push(r);
  });
  // sort numbers ascending, rows by date ascending
  const nums=Object.keys(byNum).sort((a,b)=>Number(a)-Number(b));
  let html='';
  nums.forEach(n=>{
    const rows=byNum[n].slice().sort((a,b)=>String(a.date).localeCompare(String(b.date)));
    const last=rows[rows.length-1];
    const first=rows[0];
    const lastHue = last.hue!=='' ? Number(last.hue) : -1;
    const overall = (first.hue!=='' && last.hue!=='') ? (Number(last.hue)-Number(first.hue)) : null;
    html+=`<div class="rec-card">
      <div class="rec-head">
        <div class="badge" style="background:${colorForHue(lastHue)}">${n}</div>
        <div class="rec-meta">
          <div class="t">個体 #${n}</div>
          <div class="s">${rows.length}回記録 ・ 最新 Hue ${lastHue>=0?lastHue.toFixed(1):'—'}${overall!=null?` ・ 通算 ${overall>=0?'+':''}${overall.toFixed(1)}`:''}</div>
        </div>
      </div>
      <div class="rec-rows">`;
    let prev=null;
    rows.forEach(r=>{
      const hue = r.hue!=='' ? Number(r.hue) : -1;
      let delta='', dcls='';
      if(prev!=null && hue>=0){
        const d=hue-prev;
        if(Math.abs(d)>=0.05){ delta=(d>=0?'+':'')+d.toFixed(1); dcls=d<0?'down':'up'; }
        else { delta='±0'; }
      }
      if(hue>=0) prev=hue;
      html+=`<div class="rec-row">
        <div class="rdate">${r.date}</div>
        <div class="rhue" style="color:${colorForHue(hue)}">${hue>=0?hue.toFixed(1):'—'}</div>
        ${r.label?`<div class="rlabel">${r.label}</div>`:''}
        <div class="rdelta ${dcls}">${delta}</div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  body.innerHTML=html;
}

function switchTab(which){
  const cap = which==='capture';
  $('tabCapture').classList.toggle('active', cap);
  $('tabRecords').classList.toggle('active', !cap);
  $('captureView').style.display = cap?'block':'none';
  $('recordsView').style.display = cap?'none':'block';
  if(!cap) renderRecords();
}
$('tabCapture').onclick=()=>switchTab('capture');
$('tabRecords').onclick=()=>switchTab('records');

init();
</script>
</body>
</html>
